services:
  fastapi:
    image: phuongtnd/fastapi:dev #replace with actual docker user id
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"

  streamlit:
    image: phuongtnd/streamlit:v1
    build:
      context: ./streamlit_app
      dockerfile: Dockerfile
    ports:
      - "8501:8501"
    environment:
      API_URL: "http://fastapi:8000" # Use the service name as hostname to connect to FastAPI